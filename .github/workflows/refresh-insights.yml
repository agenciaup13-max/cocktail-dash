name: Refresh insights (semanal)

on:
  schedule:
    - cron: '0 8 * * 1'      # toda segunda ~05:00 BRT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build insights (data-insights.js)
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1 -Mode insights
      - name: Commit se mudou
        shell: powershell
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-insights.js
          if (git status --porcelain data-insights.js) {
            git commit -m ("auto: insights " + (Get-Date -Format 'yyyy-MM-dd HH:mm'))
            git pull --rebase origin main
            git push
          } else { Write-Host "sem mudancas" }
