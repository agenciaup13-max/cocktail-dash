name: Refresh tráfego (3h)

on:
  schedule:
    - cron: '17 */3 * * *'   # a cada 3 horas (minuto :17 para evitar o pico do topo da hora)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build tudo (data.js + obj + insights)
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1 -Mode all
      - name: Commit se mudou
        shell: powershell
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js data-obj.js data-insights.js
          if (git status --porcelain data.js data-obj.js data-insights.js) {
            git commit -m ("auto: cloud " + (Get-Date -Format 'yyyy-MM-dd HH:mm'))
            git pull --rebase origin main
            git push
          } else { Write-Host "sem mudancas" }
